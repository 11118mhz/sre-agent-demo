<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SRE Agent</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 2rem;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 600;
      color: #f8fafc;
      margin-bottom: 0.25rem;
    }

    .subtitle {
      font-size: 0.85rem;
      color: #64748b;
      margin-bottom: 2rem;
    }

    .input-row {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 2rem;
    }

    textarea {
      flex: 1;
      background: #1e2330;
      border: 1px solid #2d3748;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 0.9rem;
      padding: 0.75rem 1rem;
      resize: vertical;
      min-height: 80px;
      font-family: inherit;
    }

    textarea:focus {
      outline: none;
      border-color: #4f6ef7;
    }

    textarea::placeholder { color: #4a5568; }

    button {
      cursor: pointer;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 500;
      padding: 0 1.5rem;
      transition: opacity 0.15s;
    }

    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    #submit-btn {
      background: #4f6ef7;
      color: white;
      align-self: flex-start;
      height: 42px;
      white-space: nowrap;
    }

    .timeline {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .event {
      border-radius: 8px;
      padding: 0.75rem 1rem;
      font-size: 0.875rem;
      line-height: 1.6;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .event-alert {
      background: #2d1f1f;
      border-left: 3px solid #f87171;
      color: #fca5a5;
      font-weight: 500;
    }

    .event-tool_call {
      background: #1a2035;
      border-left: 3px solid #4f6ef7;
      color: #93c5fd;
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 0.82rem;
    }

    .event-tool_result {
      background: #1a2535;
      border-left: 3px solid #34d399;
      color: #6ee7b7;
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 0.82rem;
      white-space: pre-wrap;
      word-break: break-all;
    }

    .event-agent_text {
      background: #1e2330;
      border-left: 3px solid #a78bfa;
      color: #ddd6fe;
      white-space: pre-wrap;
    }

    .event-done {
      background: #1a2d1f;
      border-left: 3px solid #34d399;
      color: #6ee7b7;
      font-weight: 500;
    }

    .event-approval {
      background: #2d2210;
      border-left: 3px solid #fbbf24;
      color: #fde68a;
    }

    .approval-header {
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: #fbbf24;
    }

    .approval-detail {
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 0.82rem;
      margin-bottom: 0.75rem;
      color: #fde68a;
    }

    .approval-buttons {
      display: flex;
      gap: 0.5rem;
    }

    .btn-approve {
      background: #065f46;
      color: #6ee7b7;
      padding: 0.4rem 1.25rem;
    }

    .btn-deny {
      background: #7f1d1d;
      color: #fca5a5;
      padding: 0.4rem 1.25rem;
    }

    .event-approval_granted {
      background: #1a2d1f;
      border-left: 3px solid #34d399;
      color: #6ee7b7;
    }

    .event-approval_denied {
      background: #2d1f1f;
      border-left: 3px solid #f87171;
      color: #fca5a5;
    }

    .label {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      opacity: 0.6;
      margin-bottom: 0.25rem;
    }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid #4f6ef7;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 0.5rem;
      vertical-align: middle;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .status-bar {
      font-size: 0.8rem;
      color: #64748b;
      margin-bottom: 1rem;
      min-height: 1.2rem;
    }

    .presets {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 0.75rem;
      flex-wrap: wrap;
    }

    .preset-btn {
      background: #1e2330;
      color: #94a3b8;
      border: 1px solid #2d3748;
      border-radius: 6px;
      font-size: 0.78rem;
      padding: 0.3rem 0.75rem;
    }

    .preset-btn:hover {
      background: #2d3748;
      color: #e2e8f0;
      opacity: 1;
    }
  </style>
</head>
<body>

  <h1>🚨 SRE Agent</h1>
  <p class="subtitle">Submit an alert to begin an AI-assisted investigation.</p>

  <div class="presets">
    <span style="font-size:0.78rem;color:#4a5568;align-self:center;margin-right:0.25rem;">Quick alerts:</span>
    <button class="preset-btn" onclick="setAlert('payment-api is showing elevated error rates and high latency. Investigate and remediate.')">payment-api</button>
    <button class="preset-btn" onclick="setAlert('recommendation-service memory usage is critically high and latency is degrading. Investigate and remediate.')">recommendation-service</button>
    <button class="preset-btn" onclick="setAlert('checkout-service is showing elevated latency. Customers are reporting slow checkouts. Investigate and remediate.')">checkout-service</button>
    <button class="preset-btn" onclick="setAlert('auth-service is showing a high authentication failure rate. Users are unable to log in. Investigate and remediate.')">auth-service</button>
  </div>

  <div class="input-row">
    <textarea id="alert-input" placeholder="e.g. payment-api is showing elevated error rates and high latency. Investigate and remediate."></textarea>
    <button id="submit-btn" onclick="startInvestigation()">Investigate</button>
  </div>

  <div class="status-bar" id="status"></div>
  <div class="timeline" id="timeline"></div>

  <script>
    let currentSessionId = null;

    function setAlert(text) {
      document.getElementById('alert-input').value = text;
    }

    function setStatus(text, spinning = false) {
      const bar = document.getElementById('status');
      bar.innerHTML = spinning
        ? `<span class="spinner"></span>${text}`
        : text;
    }

    function addEvent(cls, labelText, bodyHtml) {
      const el = document.createElement('div');
      el.className = `event ${cls}`;
      el.innerHTML = `<div class="label">${labelText}</div>${bodyHtml}`;
      document.getElementById('timeline').appendChild(el);
      el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      return el;
    }

    function formatJSON(obj) {
      return JSON.stringify(obj, null, 2);
    }

    async function startInvestigation() {
      const alert = document.getElementById('alert-input').value.trim();
      if (!alert) return;

      // Reset UI
      document.getElementById('timeline').innerHTML = '';
      document.getElementById('submit-btn').disabled = true;
      setStatus('Starting investigation...', true);
      currentSessionId = null;

      // Start the investigation
      const res = await fetch('/investigate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ alert })
      });
      const { session_id } = await res.json();
      currentSessionId = session_id;

      // Open SSE stream
      const evtSource = new EventSource(`/stream/${session_id}`);

      evtSource.addEventListener('alert', e => {
        const d = JSON.parse(e.data);
        addEvent('event-alert', '🚨 Alert', d.message);
        setStatus('Agent is investigating...', true);
      });

      evtSource.addEventListener('tool_call', e => {
        const d = JSON.parse(e.data);
        addEvent('event-tool_call', '🔧 Tool Call',
          `<strong>${d.tool}</strong>\n${formatJSON(d.inputs)}`);
      });

      evtSource.addEventListener('tool_result', e => {
        const d = JSON.parse(e.data);
        addEvent('event-tool_result', '📦 Result',
          formatJSON(d.result));
      });

      evtSource.addEventListener('agent_text', e => {
        const d = JSON.parse(e.data);
        addEvent('event-agent_text', '🤖 Agent', marked.parse(d.text));
      });

      evtSource.addEventListener('approval_required', e => {
        const d = JSON.parse(e.data);
        setStatus('⏸ Waiting for your approval...', false);

        const el = addEvent('event-approval', '⚠️ Approval Required', `
          <div class="approval-header">Action: ${d.tool}</div>
          <div class="approval-detail">${formatJSON(d.inputs)}</div>
          <div class="approval-buttons">
            <button class="btn-approve" onclick="sendApproval(true, this)">✅ Approve</button>
            <button class="btn-deny"    onclick="sendApproval(false, this)">❌ Deny</button>
          </div>
        `);
      });

      evtSource.addEventListener('approval_granted', e => {
        addEvent('event-approval_granted', '✅ Approved', 'Action approved — executing.');
        setStatus('Agent is continuing...', true);
      });

      evtSource.addEventListener('approval_denied', e => {
        addEvent('event-approval_denied', '❌ Denied', 'Action denied by operator.');
        setStatus('Agent is continuing...', true);
      });

      evtSource.addEventListener('done', e => {
        setStatus('✅ Investigation complete.');
        document.getElementById('submit-btn').disabled = false;
        evtSource.close();
      });

      evtSource.addEventListener('heartbeat', () => {});

      evtSource.onerror = () => {
        setStatus('Connection lost.');
        document.getElementById('submit-btn').disabled = false;
        evtSource.close();
      };
    }

    async function sendApproval(approved, btn) {
      if (!currentSessionId) return;

      // Disable both buttons immediately to prevent double-click
      const container = btn.closest('.approval-buttons');
      container.querySelectorAll('button').forEach(b => b.disabled = true);

      await fetch(`/approve/${currentSessionId}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ approved })
      });
    }
  </script>

</body>
</html>
